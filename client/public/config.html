<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSF Stats App - Configuration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #191919;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Layout ─────────────────────────────────── */
        /* header removed */
        .glow-name {
            font-weight: 700;
            background: linear-gradient(90deg, #7c5cbf, #3498db, #2ecc71, #f1c40f, #e74c3c, #7c5cbf);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            cursor: pointer;
            text-decoration: none;
        }
        .glow-name:hover { animation-duration: 1.5s; }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            padding: 12px 16px;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        /* ── Panels ─────────────────────────────────── */
        .panel {
            background: #222;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 14px;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2e2e2e;
        }

        /* ── Inputs ─────────────────────────────────── */
        input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #fff;
            border-radius: 5px;
            font-family: inherit;
            font-size: 12px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #0078d4;
        }
        input[type="text"]::placeholder { color: #555; }

        select {
            padding: 6px 8px;
            border: 1px solid #3a3a3a;
            border-radius: 5px;
            font-size: 12px;
            width: 100%;
            background: #2a2a2a;
            color: #fff;
            cursor: pointer;
        }

        .input-label {
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 5px;
            display: block;
        }
        .input-hint {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
        }
        .input-group { margin-bottom: 12px; }
        .input-group:last-child { margin-bottom: 0; }

        /* ── Toggle Switch ──────────────────────────── */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
        }
        .toggle-row:last-child { border-bottom: none; }
        .toggle-row span {
            font-size: 12px;
            font-weight: 500;
            color: #ccc;
        }
        .toggle-row.sub-option {
            padding-left: 14px;
            border-left: 2px solid #333;
            margin-left: 4px;
        }
        .toggle-row.sub-option span {
            font-size: 11px;
            color: #999;
        }
        .toggle {
            position: relative;
            width: 34px;
            height: 18px;
            flex-shrink: 0;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #3a3a3a;
            border-radius: 9px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .toggle-slider::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 2px;
            top: 2px;
            background: #888;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }
        .toggle input:checked + .toggle-slider {
            background: #0078d4;
        }
        .toggle input:checked + .toggle-slider::after {
            transform: translateX(16px);
            background: #fff;
        }

        /* ── Slider ─────────────────────────────────── */
        input[type="range"] {
            width: 100%;
            height: 4px;
            margin: 8px 0 4px;
            cursor: pointer;
            background: #3a3a3a;
            border-radius: 2px;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #0078d4;
            cursor: pointer;
        }

        /* ── Colors ─────────────────────────────────── */
        .colors-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .color-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #aaa;
        }
        input[type="color"] {
            border: 1px solid #3a3a3a;
            width: 22px;
            height: 22px;
            padding: 0;
            background: none;
            cursor: pointer;
            border-radius: 4px;
        }

        /* ── OBS Box ────────────────────────────────── */
        .obs-url {
            background: #111;
            padding: 7px 10px;
            border: 1px solid #2e2e2e;
            border-radius: 4px;
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
            user-select: all;
            cursor: text;
            color: #4caf50;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 6px;
        }

        /* ── Footer bar ─────────────────────────────── */
        .app-footer {
            padding: 8px 20px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #555;
        }
        .version-label {
            font-weight: 700;
            background: linear-gradient(90deg, #0078d4, #00b4d8, #0078d4);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
        }
        .github-btn {
            color: #8b949e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .github-btn:hover { color: #c9d1d9; }
        .credits-right {
            font-size: 11px;
            color: #555;
        }
        .credits-right a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="main-grid" style="padding-top: 16px;">
        <!-- Column 1: Player + Theme -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="panel">
                <div class="panel-title">Player</div>
                <div class="input-group">
                    <label class="input-label" for="steamid">SteamID or Username</label>
                    <input type="text" id="steamid" placeholder="STEAM_0:1:12345678 or username">
                </div>
            </div>

            <div class="panel" style="flex: 1;">
                <div class="panel-title">Theme</div>
                <div class="input-group">
                    <label class="input-label">Preset</label>
                    <select id="theme-preset">
                        <option value="custom">Custom</option>
                        <option value="default">Default Dark</option>
                        <option value="light">Clean Light</option>
                        <option value="glass">Glass Blue</option>
                        <option value="midnight">Midnight</option>
                        <option value="ember">Ember</option>
                        <option value="forest">Forest</option>
                        <option value="sunset">Sunset</option>
                        <option value="arctic">Arctic</option>
                    </select>
                </div>

                <div class="input-group">
                    <label class="input-label">Opacity <span id="opacity-val" style="color:#0078d4; font-weight:700;">100%</span></label>
                    <input type="range" id="opacity" min="10" max="100" value="100">
                </div>

                <div class="input-group">
                    <label class="input-label">Colors</label>
                    <div class="colors-grid">
                        <div class="color-item">Background <input type="color" id="bg-color" value="#000000"></div>
                        <div class="color-item">Text <input type="color" id="text-color" value="#ffffff"></div>
                        <div class="color-item">Accent <input type="color" id="accent-color" value="#3498db"></div>
                        <div class="color-item">Border <input type="color" id="border-color" value="#ffffff"></div>
                        <div class="color-item">Map Name <input type="color" id="map-name-color" value="#ffffff"></div>
                        <div class="color-item">Completed <input type="color" id="zone-completed-color" value="#2ecc71"></div>
                        <div class="color-item">Incomplete <input type="color" id="zone-not-completed-color" value="#e74c3c"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Column 2: Behavior + OBS -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="panel">
                <div class="panel-title">Behavior</div>
                <label class="toggle-row" for="always-on-top">
                    <span>Always On Top</span>
                    <div class="toggle"><input type="checkbox" id="always-on-top"><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="auto-follow-stage">
                    <span>Auto-Follow Stage</span>
                    <div class="toggle"><input type="checkbox" id="auto-follow-stage" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="horizontal-layout">
                    <span>Wide Layout</span>
                    <div class="toggle"><input type="checkbox" id="horizontal-layout"><span class="toggle-slider"></span></div>
                </label>
            </div>

            <div class="panel" style="flex: 1;">
                <div class="panel-title">OBS Browser Source</div>
                <div style="font-size: 11px; color: #888; line-height: 1.5;">
                    Add a <strong style="color:#ccc;">Browser</strong> source in OBS with this URL:
                </div>
                <div class="obs-url" id="obs-url-display">http://108.61.222.248:3000?steamId=</div>
                <div class="input-hint">Your SteamID is appended automatically.</div>
            </div>
        </div>

        <!-- Column 3: Display -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="panel" style="flex: 1;">
                <div class="panel-title">Display</div>
                <label class="toggle-row" for="show-header">
                    <span>Header</span>
                    <div class="toggle"><input type="checkbox" id="show-header" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row sub-option" for="show-pill-toggles" id="show-pill-toggles-row">
                    <span>Game/Style Toggles</span>
                    <div class="toggle"><input type="checkbox" id="show-pill-toggles" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-footer">
                    <span>Footer</span>
                    <div class="toggle"><input type="checkbox" id="show-footer" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-rank-card">
                    <span>Rank Card</span>
                    <div class="toggle"><input type="checkbox" id="show-rank-card" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-profile-stats">
                    <span>Profile Stats</span>
                    <div class="toggle"><input type="checkbox" id="show-profile-stats" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-map-info">
                    <span>Map Info Card</span>
                    <div class="toggle"><input type="checkbox" id="show-map-info" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row sub-option" for="show-map-image" id="show-map-image-row">
                    <span>Map Background Image</span>
                    <div class="toggle"><input type="checkbox" id="show-map-image" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row sub-option" for="show-zone-bar" id="show-zone-bar-row">
                    <span>Zone Completion Bar</span>
                    <div class="toggle"><input type="checkbox" id="show-zone-bar" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-points-breakdown">
                    <span>Points Breakdown Card</span>
                    <div class="toggle"><input type="checkbox" id="show-points-breakdown" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-stage-panel">
                    <span>Map PB &amp; Rank Section</span>
                    <div class="toggle"><input type="checkbox" id="show-stage-panel" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row sub-option" for="show-detailed-stats" id="show-detailed-stats-row">
                    <span>Detailed Map Stats</span>
                    <div class="toggle"><input type="checkbox" id="show-detailed-stats" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row sub-option" for="show-main-map-stats" id="show-main-map-stats-row">
                    <span>Show Map Stats Separately</span>
                    <div class="toggle"><input type="checkbox" id="show-main-map-stats"><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row sub-option" for="hide-stages" id="hide-stages-row">
                    <span>Hide Stages (Bonuses Only)</span>
                    <div class="toggle"><input type="checkbox" id="hide-stages"><span class="toggle-slider"></span></div>
                </label>
            </div>
        </div>
    </div>

    <div class="app-footer">
        <span class="version-label">v1.2.3</span>
        <a href="#" id="github-link" class="github-btn">GitHub</a>
        <span class="credits-right">by <a href="#" id="ksf-link" class="glow-name">bussn</a></span>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const PRESETS = {
            default:  { bgColor: "#000000", textColor: "#ecf0f1", accentColor: "#3498db", borderColor: "#ffffff", mapNameColor: "#ffffff", opacity: 100 },
            light:    { bgColor: "#ffffff", textColor: "#4a3f6b", accentColor: "#7c5cbf", borderColor: "#d5cee6", mapNameColor: "#4a3f6b", opacity: 90 },
            glass:    { bgColor: "#001f3f", textColor: "#7FDBFF", accentColor: "#0074D9", borderColor: "#39CCCC", mapNameColor: "#ffffff", opacity: 85 },
            midnight: { bgColor: "#0d1117", textColor: "#c9d1d9", accentColor: "#58a6ff", borderColor: "#30363d", mapNameColor: "#ffffff", opacity: 95 },
            ember:    { bgColor: "#1a0a0a", textColor: "#f5c6aa", accentColor: "#e74c3c", borderColor: "#5c2018", mapNameColor: "#ffffff", opacity: 95 },
            forest:   { bgColor: "#0a1a0a", textColor: "#a8d5a2", accentColor: "#2ecc71", borderColor: "#1e4d2b", mapNameColor: "#ffffff", opacity: 95 },
            sunset:   { bgColor: "#1a0f1e", textColor: "#f0c4ff", accentColor: "#e056a0", borderColor: "#4a2060", mapNameColor: "#ffffff", opacity: 90 },
            arctic:   { bgColor: "#0e1a2b", textColor: "#d0e8ff", accentColor: "#00bcd4", borderColor: "#1e3a5f", mapNameColor: "#ffffff", opacity: 90 }
        };

        const els = {
            steamid: document.getElementById('steamid'),
            alwaysOnTop: document.getElementById('always-on-top'),
            showMainMapStats: document.getElementById('show-main-map-stats'),
            hideStages: document.getElementById('hide-stages'),
            hideStagesRow: document.getElementById('hide-stages-row'),
            autoFollowStage: document.getElementById('auto-follow-stage'),
            horizontalLayout: document.getElementById('horizontal-layout'),
            showHeader: document.getElementById('show-header'),
            showPillToggles: document.getElementById('show-pill-toggles'),
            showPillTogglesRow: document.getElementById('show-pill-toggles-row'),
            showFooter: document.getElementById('show-footer'),
            showZoneBar: document.getElementById('show-zone-bar'),
            showRankCard: document.getElementById('show-rank-card'),
            showProfileStats: document.getElementById('show-profile-stats'),
            showDetailedStats: document.getElementById('show-detailed-stats'),
            showMapInfo: document.getElementById('show-map-info'),
            showMapImage: document.getElementById('show-map-image'),
            showMapImageRow: document.getElementById('show-map-image-row'),
            showZoneBarRow: document.getElementById('show-zone-bar-row'),
            showPointsBreakdown: document.getElementById('show-points-breakdown'),
            showStagePanel: document.getElementById('show-stage-panel'),
            showDetailedStatsRow: document.getElementById('show-detailed-stats-row'),
            showMainMapStatsRow: document.getElementById('show-main-map-stats-row'),
            obsUrlDisplay: document.getElementById('obs-url-display'),
            opacity: document.getElementById('opacity'),
            opacityVal: document.getElementById('opacity-val'),
            themePreset: document.getElementById('theme-preset'),
            colors: {
                bgColor: document.getElementById('bg-color'),
                textColor: document.getElementById('text-color'),
                accentColor: document.getElementById('accent-color'),
                borderColor: document.getElementById('border-color')
            },
            mapNameColor: document.getElementById('map-name-color'),
            zoneCompletedColor: document.getElementById('zone-completed-color'),
            zoneNotCompletedColor: document.getElementById('zone-not-completed-color')
        };

        ipcRenderer.send('get-config');
        ipcRenderer.on('config-updated', (event, config) => {
            els.steamid.value = config.steamId || '';
            els.obsUrlDisplay.innerText = `http://108.61.222.248:3000?steamId=${config.steamId || ''}`;
            els.alwaysOnTop.checked = config.alwaysOnTop !== false;
            els.showMainMapStats.checked = config.showMainMapStats || false;
            els.hideStages.checked = config.hideStages || false;
            els.autoFollowStage.checked = config.autoFollowStage !== false;
            els.horizontalLayout.checked = config.horizontalLayout || false;
            els.showHeader.checked = config.showHeader !== false;
            els.showPillToggles.checked = config.showPillToggles !== false;
            els.showFooter.checked = config.showFooter !== false;
            updateHeaderDeps();
            els.showZoneBar.checked = config.showZoneBar !== false;
            els.showRankCard.checked = config.showRankCard !== false;
            els.showProfileStats.checked = config.showProfileStats !== false;
            els.showDetailedStats.checked = config.showDetailedStats !== false;
            els.showMapInfo.checked = config.showMapInfo !== false;
            els.showMapImage.checked = config.showMapImage !== false;
            updateMapInfoDeps();
            els.showPointsBreakdown.checked = config.showPointsBreakdown !== false;
            els.showStagePanel.checked = config.showStagePanel !== false;
            updateStagePanelDeps();

            els.opacity.value = config.opacity || 100;
            els.opacityVal.innerText = els.opacity.value + '%';

            if (config.theme) {
                if (config.theme.bgColor) els.colors.bgColor.value = config.theme.bgColor;
                if (config.theme.textColor) els.colors.textColor.value = config.theme.textColor;
                if (config.theme.accentColor) els.colors.accentColor.value = config.theme.accentColor;
                if (config.theme.borderColor) els.colors.borderColor.value = config.theme.borderColor;
            }
            if (config.mapNameColor) els.mapNameColor.value = config.mapNameColor;
            if (config.zoneCompletedColor) els.zoneCompletedColor.value = config.zoneCompletedColor;
            if (config.zoneNotCompletedColor) els.zoneNotCompletedColor.value = config.zoneNotCompletedColor;
        });

        els.opacity.addEventListener('input', (e) => {
            els.opacityVal.innerText = e.target.value + '%';
        });

        els.themePreset.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val !== 'custom' && PRESETS[val]) {
                const p = PRESETS[val];
                els.colors.bgColor.value = p.bgColor;
                els.colors.textColor.value = p.textColor;
                els.colors.accentColor.value = p.accentColor;
                els.colors.borderColor.value = p.borderColor;
                if (p.mapNameColor) els.mapNameColor.value = p.mapNameColor;
                autoSave();
            }
        });

        function updateHeaderDeps() {
            const show = els.showHeader.checked;
            els.showPillTogglesRow.style.display = show ? '' : 'none';
        }

        function updateMapInfoDeps() {
            const show = els.showMapInfo.checked;
            els.showMapImageRow.style.display = show ? '' : 'none';
            els.showZoneBarRow.style.display = show ? '' : 'none';
        }

        function updateStagePanelDeps() {
            const show = els.showStagePanel.checked;
            els.showDetailedStatsRow.style.display = show ? '' : 'none';
            els.showMainMapStatsRow.style.display = show ? '' : 'none';
            // Hide Stages is only relevant when Show Map Stats Separately is OFF
            els.hideStagesRow.style.display = (show && !els.showMainMapStats.checked) ? '' : 'none';
        }

        let saveTimeout = null;
        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const config = {
                    steamId: els.steamid.value,
                    alwaysOnTop: els.alwaysOnTop.checked,
                    showMainMapStats: els.showMainMapStats.checked,
                    hideStages: els.hideStages.checked,
                    autoFollowStage: els.autoFollowStage.checked,
                    horizontalLayout: els.horizontalLayout.checked,
                    showHeader: els.showHeader.checked,
                    showPillToggles: els.showPillToggles.checked,
                    showFooter: els.showFooter.checked,
                    showZoneBar: els.showZoneBar.checked,
                    showRankCard: els.showRankCard.checked,
                    showProfileStats: els.showProfileStats.checked,
                    showDetailedStats: els.showDetailedStats.checked,
                    showMapInfo: els.showMapInfo.checked,
                    showMapImage: els.showMapImage.checked,
                    showPointsBreakdown: els.showPointsBreakdown.checked,
                    showStagePanel: els.showStagePanel.checked,
                    opacity: parseInt(els.opacity.value),
                    mapNameColor: els.mapNameColor.value,
                    zoneCompletedColor: els.zoneCompletedColor.value,
                    zoneNotCompletedColor: els.zoneNotCompletedColor.value,
                    theme: {
                        bgColor: els.colors.bgColor.value,
                        textColor: els.colors.textColor.value,
                        accentColor: els.colors.accentColor.value,
                        borderColor: els.colors.borderColor.value
                    }
                };
                ipcRenderer.send('save-config', config);
            }, 400);
        }

        els.steamid.addEventListener('input', () => {
            els.obsUrlDisplay.innerText = `http://108.61.222.248:3000?steamId=${els.steamid.value}`;
            autoSave();
        });
        els.alwaysOnTop.addEventListener('change', autoSave);
        els.showMainMapStats.addEventListener('change', () => { updateStagePanelDeps(); autoSave(); });
        els.hideStages.addEventListener('change', autoSave);
        els.autoFollowStage.addEventListener('change', autoSave);
        els.horizontalLayout.addEventListener('change', autoSave);
        els.showHeader.addEventListener('change', () => { updateHeaderDeps(); autoSave(); });
        els.showPillToggles.addEventListener('change', autoSave);
        els.showFooter.addEventListener('change', autoSave);
        els.showZoneBar.addEventListener('change', autoSave);
        els.showRankCard.addEventListener('change', autoSave);
        els.showProfileStats.addEventListener('change', autoSave);
        els.showDetailedStats.addEventListener('change', autoSave);
        els.showMapInfo.addEventListener('change', () => { updateMapInfoDeps(); autoSave(); });
        els.showMapImage.addEventListener('change', autoSave);
        els.showPointsBreakdown.addEventListener('change', autoSave);
        els.showStagePanel.addEventListener('change', () => { updateStagePanelDeps(); autoSave(); });
        els.opacity.addEventListener('input', autoSave);
        els.colors.bgColor.addEventListener('input', autoSave);
        els.colors.textColor.addEventListener('input', autoSave);
        els.colors.accentColor.addEventListener('input', autoSave);
        els.colors.borderColor.addEventListener('input', autoSave);
        els.mapNameColor.addEventListener('input', autoSave);
