<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSF Stats App - Configuration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #191919;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Layout ─────────────────────────────────── */
        .app-header {
            padding: 14px 20px 10px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
            color: #fff;
        }
        .app-header .credits-inline {
            font-size: 11px;
            color: #555;
        }
        .app-header .credits-inline a {
            color: #666;
            text-decoration: none;
        }
        .app-header .credits-inline a:hover { color: #999; }
        .glow-name {
            font-weight: 700;
            background: linear-gradient(90deg, #7c5cbf, #3498db, #2ecc71, #f1c40f, #e74c3c, #7c5cbf);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            cursor: pointer;
            text-decoration: none;
        }
        .glow-name:hover { animation-duration: 1.5s; }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            padding: 12px 16px;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        /* ── Panels ─────────────────────────────────── */
        .panel {
            background: #222;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 14px;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2e2e2e;
        }

        /* ── Inputs ─────────────────────────────────── */
        input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #fff;
            border-radius: 5px;
            font-family: inherit;
            font-size: 12px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #0078d4;
        }
        input[type="text"]::placeholder { color: #555; }

        select {
            padding: 6px 8px;
            border: 1px solid #3a3a3a;
            border-radius: 5px;
            font-size: 12px;
            width: 100%;
            background: #2a2a2a;
            color: #fff;
            cursor: pointer;
        }

        .input-label {
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 5px;
            display: block;
        }
        .input-hint {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
        }
        .input-group { margin-bottom: 12px; }
        .input-group:last-child { margin-bottom: 0; }

        /* ── Toggle Switch ──────────────────────────── */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
        }
        .toggle-row:last-child { border-bottom: none; }
        .toggle-row span {
            font-size: 12px;
            font-weight: 500;
            color: #ccc;
        }
        .toggle {
            position: relative;
            width: 34px;
            height: 18px;
            flex-shrink: 0;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #3a3a3a;
            border-radius: 9px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .toggle-slider::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 2px;
            top: 2px;
            background: #888;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }
        .toggle input:checked + .toggle-slider {
            background: #0078d4;
        }
        .toggle input:checked + .toggle-slider::after {
            transform: translateX(16px);
            background: #fff;
        }

        /* ── Slider ─────────────────────────────────── */
        input[type="range"] {
            width: 100%;
            height: 4px;
            margin: 8px 0 4px;
            cursor: pointer;
            background: #3a3a3a;
            border-radius: 2px;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #0078d4;
            cursor: pointer;
        }

        /* ── Colors ─────────────────────────────────── */
        .colors-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .color-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #aaa;
        }
        input[type="color"] {
            border: 1px solid #3a3a3a;
            width: 22px;
            height: 22px;
            padding: 0;
            background: none;
            cursor: pointer;
            border-radius: 4px;
        }

        /* ── OBS Box ────────────────────────────────── */
        .obs-url {
            background: #111;
            padding: 7px 10px;
            border: 1px solid #2e2e2e;
            border-radius: 4px;
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
            user-select: all;
            cursor: text;
            color: #4caf50;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 6px;
        }

        /* ── Footer bar ─────────────────────────────── */
        .app-footer {
            padding: 8px 20px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            color: #555;
        }
        .app-footer a {
            color: #666;
            text-decoration: none;
        }
        .app-footer a:hover { color: #999; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>KSF Stats Overlay</h1>
        <span class="credits-inline">by <a href="#" id="ksf-link" class="glow-name">bussn</a></span>
    </div>

    <div class="main-grid">
        <!-- Column 1: Player + Toggles -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="panel">
                <div class="panel-title">Player</div>
                <div class="input-group">
                    <label class="input-label" for="steamid">SteamID or Username</label>
                    <input type="text" id="steamid" placeholder="STEAM_0:1:12345678 or username">
                </div>
            </div>

            <div class="panel" style="flex: 1;">
                <div class="panel-title">Display</div>
                <label class="toggle-row" for="show-zone-bar">
                    <span>Zone Completion Bar</span>
                    <div class="toggle"><input type="checkbox" id="show-zone-bar" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-rank-card">
                    <span>Rank / Points Card</span>
                    <div class="toggle"><input type="checkbox" id="show-rank-card" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-profile-stats">
                    <span>Profile Stats</span>
                    <div class="toggle"><input type="checkbox" id="show-profile-stats" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-detailed-stats">
                    <span>Detailed Map Stats</span>
                    <div class="toggle"><input type="checkbox" id="show-detailed-stats" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="show-main-map-stats">
                    <span>Show Map Stats Separately</span>
                    <div class="toggle"><input type="checkbox" id="show-main-map-stats"><span class="toggle-slider"></span></div>
                </label>
            </div>
        </div>

        <!-- Column 2: Behavior + OBS -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="panel">
                <div class="panel-title">Behavior</div>
                <label class="toggle-row" for="always-on-top">
                    <span>Always On Top</span>
                    <div class="toggle"><input type="checkbox" id="always-on-top"><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="auto-follow-stage">
                    <span>Auto-Follow Stage</span>
                    <div class="toggle"><input type="checkbox" id="auto-follow-stage" checked><span class="toggle-slider"></span></div>
                </label>
                <label class="toggle-row" for="horizontal-layout">
                    <span>Wide Layout</span>
                    <div class="toggle"><input type="checkbox" id="horizontal-layout"><span class="toggle-slider"></span></div>
                </label>
            </div>

            <div class="panel" style="flex: 1;">
                <div class="panel-title">OBS Browser Source</div>
                <div style="font-size: 11px; color: #888; line-height: 1.5;">
                    Add a <strong style="color:#ccc;">Browser</strong> source in OBS with this URL:
                </div>
                <div class="obs-url" id="obs-url-display">http://108.61.222.248:3000?steamId=</div>
                <div class="input-hint">Your SteamID is appended automatically.</div>
            </div>
        </div>

        <!-- Column 3: Theme -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="panel" style="flex: 1;">
                <div class="panel-title">Theme</div>
                <div class="input-group">
                    <label class="input-label">Preset</label>
                    <select id="theme-preset">
                        <option value="custom">Custom</option>
                        <option value="default">Default Dark</option>
                        <option value="light">Clean Light</option>
                        <option value="glass">Glass Blue</option>
                    </select>
                </div>

                <div class="input-group">
                    <label class="input-label">Opacity <span id="opacity-val" style="color:#0078d4; font-weight:700;">100%</span></label>
                    <input type="range" id="opacity" min="10" max="100" value="100">
                </div>

                <div class="input-group">
                    <label class="input-label">Colors</label>
                    <div class="colors-grid">
                        <div class="color-item">Background <input type="color" id="bg-color" value="#000000"></div>
                        <div class="color-item">Text <input type="color" id="text-color" value="#ffffff"></div>
                        <div class="color-item">Accent <input type="color" id="accent-color" value="#3498db"></div>
                        <div class="color-item">Border <input type="color" id="border-color" value="#ffffff"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="app-footer">
        <span>coming soon: styles and 100t</span>
        <span style="color:#333;">|</span>
        <a href="#" id="github-link">github</a>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const PRESETS = {
            default: { bgColor: "#000000", textColor: "#ecf0f1", accentColor: "#3498db", borderColor: "#ffffff", opacity: 100 },
            light:   { bgColor: "#ffffff", textColor: "#4a3f6b", accentColor: "#7c5cbf", borderColor: "#d5cee6", opacity: 90 },
            glass:   { bgColor: "#001f3f", textColor: "#7FDBFF", accentColor: "#0074D9", borderColor: "#39CCCC", opacity: 85 }
        };

        const els = {
            steamid: document.getElementById('steamid'),
            alwaysOnTop: document.getElementById('always-on-top'),
            showMainMapStats: document.getElementById('show-main-map-stats'),
            autoFollowStage: document.getElementById('auto-follow-stage'),
            horizontalLayout: document.getElementById('horizontal-layout'),
            showZoneBar: document.getElementById('show-zone-bar'),
            showRankCard: document.getElementById('show-rank-card'),
            showProfileStats: document.getElementById('show-profile-stats'),
            showDetailedStats: document.getElementById('show-detailed-stats'),
            obsUrlDisplay: document.getElementById('obs-url-display'),
            opacity: document.getElementById('opacity'),
            opacityVal: document.getElementById('opacity-val'),
            themePreset: document.getElementById('theme-preset'),
            colors: {
                bgColor: document.getElementById('bg-color'),
                textColor: document.getElementById('text-color'),
                accentColor: document.getElementById('accent-color'),
                borderColor: document.getElementById('border-color')
            }
        };

        ipcRenderer.send('get-config');
        ipcRenderer.on('config-updated', (event, config) => {
            els.steamid.value = config.steamId || '';
            els.obsUrlDisplay.innerText = `http://108.61.222.248:3000?steamId=${config.steamId || ''}`;
            els.alwaysOnTop.checked = config.alwaysOnTop !== false;
            els.showMainMapStats.checked = config.showMainMapStats || false;
            els.autoFollowStage.checked = config.autoFollowStage !== false;
            els.horizontalLayout.checked = config.horizontalLayout || false;
            els.showZoneBar.checked = config.showZoneBar !== false;
            els.showRankCard.checked = config.showRankCard !== false;
            els.showProfileStats.checked = config.showProfileStats !== false;
            els.showDetailedStats.checked = config.showDetailedStats !== false;

            els.opacity.value = config.opacity || 100;
            els.opacityVal.innerText = els.opacity.value + '%';

            if (config.theme) {
                if (config.theme.bgColor) els.colors.bgColor.value = config.theme.bgColor;
                if (config.theme.textColor) els.colors.textColor.value = config.theme.textColor;
                if (config.theme.accentColor) els.colors.accentColor.value = config.theme.accentColor;
                if (config.theme.borderColor) els.colors.borderColor.value = config.theme.borderColor;
            }
        });

        els.opacity.addEventListener('input', (e) => {
            els.opacityVal.innerText = e.target.value + '%';
        });

        els.themePreset.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val !== 'custom' && PRESETS[val]) {
                const p = PRESETS[val];
                els.colors.bgColor.value = p.bgColor;
                els.colors.textColor.value = p.textColor;
                els.colors.accentColor.value = p.accentColor;
                els.colors.borderColor.value = p.borderColor;
                autoSave();
            }
        });

        let saveTimeout = null;
        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const config = {
                    steamId: els.steamid.value,
                    alwaysOnTop: els.alwaysOnTop.checked,
                    showMainMapStats: els.showMainMapStats.checked,
                    autoFollowStage: els.autoFollowStage.checked,
                    horizontalLayout: els.horizontalLayout.checked,
                    showZoneBar: els.showZoneBar.checked,
                    showRankCard: els.showRankCard.checked,
                    showProfileStats: els.showProfileStats.checked,
                    showDetailedStats: els.showDetailedStats.checked,
                    opacity: parseInt(els.opacity.value),
                    theme: {
                        bgColor: els.colors.bgColor.value,
                        textColor: els.colors.textColor.value,
                        accentColor: els.colors.accentColor.value,
                        borderColor: els.colors.borderColor.value
                    }
                };
                ipcRenderer.send('save-config', config);
            }, 400);
        }

        els.steamid.addEventListener('input', () => {
            els.obsUrlDisplay.innerText = `http://108.61.222.248:3000?steamId=${els.steamid.value}`;
            autoSave();
        });
        els.alwaysOnTop.addEventListener('change', autoSave);
        els.showMainMapStats.addEventListener('change', autoSave);
        els.autoFollowStage.addEventListener('change', autoSave);
        els.horizontalLayout.addEventListener('change', autoSave);
        els.showZoneBar.addEventListener('change', autoSave);
        els.showRankCard.addEventListener('change', autoSave);
        els.showProfileStats.addEventListener('change', autoSave);
        els.showDetailedStats.addEventListener('change', autoSave);
        els.opacity.addEventListener('input', autoSave);
        els.colors.bgColor.addEventListener('input', autoSave);
        els.colors.textColor.addEventListener('input', autoSave);
        els.colors.accentColor.addEventListener('input', autoSave);
        els.colors.borderColor.addEventListener('input', autoSave);

        document.getElementById('github-link').addEventListener('click', (e) => {
            e.preventDefault();
            ipcRenderer.send('open-external', 'https://github.com/callmebussin/ksf-overlay');
        });
        document.getElementById('ksf-link').addEventListener('click', (e) => {
            e.preventDefault();
            ipcRenderer.send('open-external', 'https://ksf.surf/players/STEAM_0:0:184941605');
        });
    </script>
</body>
</html>
